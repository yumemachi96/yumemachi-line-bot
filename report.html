<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作業完了報告書 | 夢街美装</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#F4F7FA;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto}
input,textarea,button{font-family:inherit}
.header{background:#1a3a5c;padding:16px 20px 12px;position:sticky;top:0;z-index:10}
.header h1{color:#fff;font-size:18px;font-weight:800}
.header small{color:#C9A557;font-size:10px;font-weight:700;letter-spacing:2px;display:block;margin-bottom:2px}
.steps{display:flex;gap:4px;margin-top:14px}
.step{flex:1;text-align:center;padding-bottom:6px;cursor:pointer;border-bottom:3px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);font-size:10px;font-weight:700}
.step.active{border-bottom-color:#C9A557;color:#C9A557}
.page{display:none;padding:20px}
.page.active{display:block}
.card{background:#fff;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,58,92,0.07)}
.card-head{background:#1a3a5c;padding:10px 16px;color:#fff;font-weight:700;font-size:13px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.field input,.field textarea{width:100%;border:1.5px solid #E8EFF7;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a3a5c;background:#fff;outline:none}
.field textarea{resize:none;line-height:1.7}
.row2{display:flex;gap:10px}
.row2 .field{flex:1}
.btn{width:100%;padding:14px;border-radius:10px;border:none;background:#1a3a5c;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.btn-outline{background:#fff;border:2px solid #1a3a5c;color:#1a3a5c}
.btn-gold{background:linear-gradient(135deg,#1a3a5c,#2a5a8c);font-size:16px;font-weight:800;padding:18px;box-shadow:0 4px 20px rgba(26,58,92,0.35)}
.btn-row{display:flex;gap:10px;margin-top:4px}
.btn-row .btn{margin-top:0}
.check-item{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid #E8EFF7}
.check-item:last-child{border-bottom:none}
.check-item:nth-child(even){background:#F4F7FA}
.checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #C0CEDC;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.checkbox.checked{background:#C9A557;border-color:#C9A557;color:#fff;font-size:14px;font-weight:900}
.check-label{font-size:13px;color:#1a3a5c}
.check-label.done{color:#8A9BB0;text-decoration:line-through}
.ac-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #E8EFF7}
.progress-bar{background:#E8EFF7;border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,#1a3a5c,#C9A557);border-radius:99px;transition:width .3s}
.photo-area{display:flex;gap:10px;padding:14px}
.photo-slot{flex:1}
.photo-label{font-size:11px;font-weight:700;text-align:center;padding:5px 0;border-radius:6px 6px 0 0;letter-spacing:1px}
.photo-label.before{background:#8A9BB0;color:#fff}
.photo-label.after{background:#C9A557;color:#1a3a5c}
.photo-box{height:130px;border-radius:0 0 6px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.photo-box.before{background:#E4EBF4;border:1.5px dashed #B5C5D8;border-top:none}
.photo-box.after{background:#EEF5EC;border:1.5px dashed #A5C4A0;border-top:none}
.photo-box img{width:100%;height:100%;object-fit:cover}
.change-label{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;border-radius:4px;padding:2px 6px}
.summary{background:#1a3a5c;border-radius:14px;padding:18px;margin-bottom:20px}
.summary-title{color:#C9A557;font-weight:800;font-size:13px;margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
.summary-key{color:rgba(255,255,255,0.6);font-size:12px}
.summary-val{color:#fff;font-size:12px;font-weight:700}
.note{font-size:11px;color:#8A9BB0;text-align:center;line-height:1.6;margin-top:10px}
.footer{text-align:center;padding-bottom:20px;color:#B0BFCF;font-size:10px}

/* 報告書プレビュー */
#reportView{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:100;overflow-y:auto}
.rv-slide{padding:24px;border-bottom:8px solid #F4F7FA}
.rv-header{background:#1a3a5c;margin:-24px -24px 20px;padding:20px 24px 16px;position:relative}
.rv-header::after{content:'';display:block;height:4px;background:#C9A557;margin:12px -24px -16px}
.rv-title{color:#fff;font-size:22px;font-weight:800}
.rv-sub{color:#C9A557;font-size:11px;font-style:italic;margin-top:2px}
.rv-tag{display:inline-block;background:#C9A557;color:#1a3a5c;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;margin-right:6px;margin-bottom:4px}
.rv-tagval{font-size:12px;color:#fff}
.rv-section{background:#1a3a5c;color:#fff;font-size:12px;font-weight:700;padding:8px 12px;margin:12px 0 0;border-radius:4px 4px 0 0}
.rv-row{display:flex;align-items:center;padding:9px 12px;border:1px solid #E8EFF7;border-top:none;font-size:12px}
.rv-row:nth-child(even){background:#F4F7FA}
.rv-row-key{color:#1a3a5c;font-weight:700;width:90px;flex-shrink:0}
.rv-row-sep{width:2px;height:20px;background:#C9A557;margin:0 10px;flex-shrink:0}
.rv-row-val{color:#1a3a5c;flex:1}
.rv-cols{display:flex;gap:8px}
.rv-col{flex:1}
.rv-col-head{background:#1a3a5c;color:#fff;font-size:11px;font-weight:700;padding:6px 10px}
.rv-check{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:11px;border-bottom:1px solid #E8EFF7}
.rv-check:nth-child(even){background:#F4F7FA}
.rv-cb{width:16px;height:16px;border-radius:4px;border:1.5px solid #C0CEDC;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
.rv-cb.on{background:#C9A557;border-color:#C9A557;color:#fff}
.rv-photo-row{display:flex;gap:8px;margin-top:8px}
.rv-photo-col{flex:1}
.rv-photo-head{font-size:10px;font-weight:700;text-align:center;padding:4px;border-radius:4px 4px 0 0}
.rv-photo-head.b{background:#8A9BB0;color:#fff}
.rv-photo-head.a{background:#C9A557;color:#1a3a5c}
.rv-photo-box{height:100px;border-radius:0 0 4px 4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#8A9BB0}
.rv-photo-box.b{background:#E4EBF4;border:1px dashed #B5C5D8;border-top:none}
.rv-photo-box.a{background:#EEF5EC;border:1px dashed #A5C4A0;border-top:none}
.rv-photo-box img{width:100%;height:100%;object-fit:cover;border-radius:0 0 4px 4px}
.rv-notes-box{border:1px solid #E8EFF7;border-top:none;padding:10px 12px;min-height:60px;font-size:12px;color:#1a3a5c}
.rv-sig{display:flex;gap:12px;margin-top:12px}
.rv-sig-box{flex:1;border:1px solid #E8EFF7;border-radius:6px;padding:10px;font-size:9px;color:#8A9BB0}
.rv-sig-line{height:1px;background:#1a3a5c;margin:16px 0 4px}
.rv-footer-bar{background:#1a3a5c;color:#8A9BB0;font-size:8px;text-align:center;padding:6px;margin:20px -24px -24px}
.rv-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#1a3a5c;position:sticky;top:0;z-index:10}
.rv-topbar-title{color:#C9A557;font-weight:800;font-size:14px}
.rv-close{background:transparent;border:1.5px solid #C9A557;color:#C9A557;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer}
.rv-share{background:#C9A557;border:none;color:#1a3a5c;font-size:12px;font-weight:800;padding:6px 14px;border-radius:8px;cursor:pointer}
@media print{
  .rv-topbar{display:none!important}
  #reportView{position:static}
}
</style>
</head>
<body>
<div class="header">
  <small>夢街美装</small>
  <h1>作業完了報告書</h1>
  <div class="steps">
    <div class="step active" onclick="goTo(0)">基本情報</div>
    <div class="step" onclick="goTo(1)">チェック</div>
    <div class="step" onclick="goTo(2)">写真</div>
    <div class="step" onclick="goTo(3)">特記・出力</div>
  </div>
</div>

<div id="p0" class="page active">
  <div class="card"><div style="padding:18px">
    <div class="field"><label>物件名</label><input id="property" placeholder="例）グリーンハイツ101"></div>
    <div class="field"><label>所在地</label><input id="address" placeholder="例）静岡市葵区..."></div>
    <div class="field"><label>作業日</label><input id="date" type="date"></div>
    <div class="row2">
      <div class="field"><label>開始時刻</label><input id="timeFrom" type="time"></div>
      <div class="field"><label>終了時刻</label><input id="timeTo" type="time"></div>
    </div>
    <div class="field"><label>依頼担当者名</label><input id="client" placeholder="不動産会社 担当者名"></div>
    <div class="field"><label>作業担当者名</label><input id="worker" placeholder="夢街美装 担当者名"></div>
  </div></div>
  <button class="btn" onclick="goTo(1)">チェックリストへ →</button>
</div>

<div id="p1" class="page">
  <div class="card" style="padding:14px 16px">
    <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#1a3a5c;font-weight:700">完了項目</span><span id="countLabel" style="font-size:13px;font-weight:800;color:#C9A557">0 / 16</span></div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="card"><div class="card-head">💧 水回り清掃</div><div id="leftList"></div></div>
  <div class="card"><div class="card-head">🏠 居室・共用部</div><div id="rightList"></div></div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="goTo(0)">← 戻る</button>
    <button class="btn" onclick="goTo(2)">写真へ →</button>
  </div>
</div>

<div id="p2" class="page">
  <p style="font-size:12px;color:#8A9BB0;margin-bottom:16px">各箇所の施工前・後の写真を追加してください</p>
  <div class="card">
    <div class="card-head" style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;border-radius:50%;background:#C9A557;display:flex;align-items:center;justify-content:center;color:#1a3a5c;font-weight:800;font-size:12px">1</div>箇所 1</div>
    <div class="photo-area">
      <div class="photo-slot"><div class="photo-label before">施工前</div><div class="photo-box before" id="pb0" onclick="document.getElementById('b0').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="b0" accept="image/*" style="display:none" onchange="showPhoto(this,'pb0','b0')"></div>
      <div class="photo-slot"><div class="photo-label after">施工後</div><div class="photo-box after" id="pa0" onclick="document.getElementById('a0').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="a0" accept="image/*" style="display:none" onchange="showPhoto(this,'pa0','a0')"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head" style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;border-radius:50%;background:#C9A557;display:flex;align-items:center;justify-content:center;color:#1a3a5c;font-weight:800;font-size:12px">2</div>箇所 2</div>
    <div class="photo-area">
      <div class="photo-slot"><div class="photo-label before">施工前</div><div class="photo-box before" id="pb1" onclick="document.getElementById('b1').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="b1" accept="image/*" style="display:none" onchange="showPhoto(this,'pb1','b1')"></div>
      <div class="photo-slot"><div class="photo-label after">施工後</div><div class="photo-box after" id="pa1" onclick="document.getElementById('a1').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="a1" accept="image/*" style="display:none" onchange="showPhoto(this,'pa1','a1')"></div>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="goTo(1)">← 戻る</button>
    <button class="btn" onclick="goTo(3)">特記・出力へ →</button>
  </div>
</div>

<div id="p3" class="page">
  <div class="card">
    <div class="card-head">📝 特記事項</div>
    <div style="padding:14px"><textarea id="notes" rows="4" placeholder="不具合・追加対応・確認事項などをご記入ください" style="width:100%;border:1.5px solid #E8EFF7;border-radius:8px;padding:10px 12px;font-size:13px;color:#1a3a5c;background:#F4F7FA;outline:none;resize:none;line-height:1.7"></textarea></div>
  </div>
  <div class="card">
    <div class="card-head">🛡 品質確認チェック</div>
    <div id="qualityList"></div>
  </div>
  <div class="summary">
    <div class="summary-title">📋 出力内容の確認</div>
    <div class="summary-row"><span class="summary-key">物件名</span><span class="summary-val" id="s-property">—</span></div>
    <div class="summary-row"><span class="summary-key">作業日</span><span class="summary-val" id="s-date">—</span></div>
    <div class="summary-row"><span class="summary-key">担当者</span><span class="summary-val" id="s-worker">—</span></div>
    <div class="summary-row"><span class="summary-key">チェック</span><span class="summary-val" id="s-check">0/16項目</span></div>
    <div class="summary-row"><span class="summary-key">エアコン</span><span class="summary-val" id="s-ac">—</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-outline" onclick="goTo(2)">← 戻る</button>
  </div>
  <button class="btn btn-gold" style="margin-top:10px" onclick="showReport()">📄　報告書を表示する</button>
  <p class="note">表示後に「PDF保存」→LINEで送れます</p>
</div>

<div id="reportView">
  <div class="rv-topbar">
    <span class="rv-topbar-title">完了報告書</span>
    <div style="display:flex;gap:8px">
      <button class="rv-close" onclick="closeReport()">✕ 閉じる</button>
      <button class="rv-share" onclick="shareReport()">共有・PDF</button>
    </div>
  </div>
  <div id="reportContent"></div>
</div>

<div class="footer">夢街美装　TEL 054-298-7605</div>
<script>
const LEFT=['浴槽・浴室床・壁・扉レール','換気扇（浴室）・鏡','洗面ボウル・蛇口・鏡','排水口・収納外面','便器・タンク・床・壁','換気扇（トイレ）','レンジフード・コンロ','シンク・扉面'];
const RIGHT=['床クリーニング・ワックス仕上げ','窓ガラス・窓枠全箇所','クローゼット内清掃','玄関タイル・下駄箱・ドア面','共用部廊下・エントランス','エアコン清掃','鍵交換','入居前設備チェック・記録'];
const QUALITY=['翌日担当者による仕上がり確認','施工前後写真の撮影・提出','不備がある場合は無償再対応を実施','作業当日中に報告書を提出'];
const checked={},quality={},photoData={b0:null,a0:null,b1:null,a1:null};

function buildList(items,id,isRight){
  const c=document.getElementById(id);
  items.forEach((item,i)=>{
    const d=document.createElement('div');
    if(item==='エアコン清掃'){
      d.className='ac-row';
      d.innerHTML='<div class="checkbox" id="acCb"></div><span class="check-label" style="flex:1">エアコン清掃</span><input type="number" id="acCount" min="0" max="99" placeholder="0" style="width:44px;text-align:center;border:1.5px solid #E8EFF7;border-radius:6px;padding:5px 4px;font-size:14px;color:#1a3a5c;outline:none"><span style="font-size:12px;color:#1a3a5c;margin-left:4px">台</span>';
      d.querySelector('.checkbox').onclick=()=>toggleItem('エアコン清掃','acCb',null);
      d.querySelector('span').onclick=()=>toggleItem('エアコン清掃','acCb',null);
      d.querySelector('input').oninput=function(){if(this.value){checked['エアコン清掃']=true;const cb=document.getElementById('acCb');cb.classList.add('checked');cb.textContent='✓';}updateProgress();};
    }else{
      const cbId='cb'+i+(isRight?'r':'l');
      const lblId='lbl'+i+(isRight?'r':'l');
      d.className='check-item';
      d.innerHTML='<div class="checkbox" id="'+cbId+'"></div><span class="check-label" id="'+lblId+'">'+item+'</span>';
      d.onclick=()=>toggleItem(item,cbId,lblId);
    }
    c.appendChild(d);
  });
}

function toggleItem(item,cbId,lblId){
  checked[item]=!checked[item];
  const cb=document.getElementById(cbId);
  cb.classList.toggle('checked',checked[item]);
  cb.textContent=checked[item]?'✓':'';
  if(lblId){const lb=document.getElementById(lblId);if(lb)lb.classList.toggle('done',checked[item]);}
  updateProgress();
}

function updateProgress(){
  const n=[...LEFT,...RIGHT].filter(i=>checked[i]).length;
  document.getElementById('countLabel').textContent=n+' / 16';
  document.getElementById('progressFill').style.width=Math.round(n/16*100)+'%';
}

function buildQuality(){
  const c=document.getElementById('qualityList');
  QUALITY.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='check-item';
    const cbId='qcb'+i;
    d.innerHTML='<div class="checkbox" id="'+cbId+'"></div><span class="check-label">'+item+'</span>';
    d.onclick=()=>{quality[item]=!quality[item];const cb=document.getElementById(cbId);cb.classList.toggle('checked',quality[item]);cb.textContent=quality[item]?'✓':'';};
    c.appendChild(d);
  });
}

function goTo(n){
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',i===n));
  document.querySelectorAll('.step').forEach((s,i)=>s.classList.toggle('active',i===n));
  if(n===3)updateSummary();
  window.scrollTo(0,0);
}

function updateSummary(){
  const d=document.getElementById('date').value;
  document.getElementById('s-property').textContent=document.getElementById('property').value||'—';
  document.getElementById('s-date').textContent=d?new Date(d).toLocaleDateString('ja-JP'):'—';
  document.getElementById('s-worker').textContent=document.getElementById('worker').value||'—';
  const n=[...LEFT,...RIGHT].filter(i=>checked[i]).length;
  document.getElementById('s-check').textContent=n+'/16項目完了';
  const ac=document.getElementById('acCount')?document.getElementById('acCount').value:'';
  document.getElementById('s-ac').textContent=ac?ac+'台':'—';
}

function showPhoto(input,boxId,key){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    photoData[key]=e.target.result;
    const box=document.getElementById(boxId);
    box.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover"><div class="change-label">タップで変更</div>';
    box.onclick=()=>input.click();
  };
  reader.readAsDataURL(file);
}

function showReport(){
  const prop=document.getElementById('property').value||'（物件名）';
  const addr=document.getElementById('address').value||'';
  const dt=document.getElementById('date').value;
  const tf=document.getElementById('timeFrom').value;
  const tt=document.getElementById('timeTo').value;
  const cl=document.getElementById('client').value||'';
  const wk=document.getElementById('worker').value||'';
  const nt=document.getElementById('notes').value||'なし';
  const ac=document.getElementById('acCount')?document.getElementById('acCount').value:'';
  const dateStr=dt?new Date(dt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}):'　年　月　日';
  const timeStr=tf&&tt?tf+'〜'+tt:'　時〜　時';

  let html='';

  // スライド1: 表紙
  html+='<div class="rv-slide" style="background:#1a3a5c;min-height:280px;position:relative;overflow:hidden">';
  html+='<div style="position:absolute;left:0;top:0;width:8px;height:100%;background:#C9A557"></div>';
  html+='<div style="position:absolute;right:0;top:0;width:80px;height:100%;background:#0d2137"></div>';
  html+='<div style="padding:32px 24px 24px 24px">';
  html+='<div style="color:#C9A557;font-size:11px;font-weight:700;letter-spacing:3px;margin-bottom:8px">夢街美装 / Yumemachi Bisou</div>';
  html+='<div style="color:#fff;font-size:36px;font-weight:800;margin-bottom:6px">作業完了報告書</div>';

  w.document.close();
  setTimeout(()=>w.print(),800);


buildList(LEFT,'leftList',false);
