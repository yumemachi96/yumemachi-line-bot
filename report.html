<!DOCTYPE html>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef}=React;
const NAVY="#1a3a5c",GOLD="#C9A557",LIGHT="#F4F7FA",MID="#E8EFF7";
const LEFT_ITEMS=["浴槽・浴室床・壁・扉レール","換気扇（浴室）・鏡","洗面ボウル・蛇口・鏡","排水口・収納外面","便器・タンク・床・壁","換気扇（トイレ）","レンジフード・コンロ","シンク・扉面"];
const RIGHT_ITEMS=["床クリーニング・ワックス仕上げ","窓ガラス・窓枠全箇所","クローゼット内清掃","玄関タイル・下駄箱・ドア面","共用部廊下・エントランス","エアコン清掃","鍵交換","入居前設備チェック・記録"];

const QUALITY_ITEMS=["翌日担当者による仕上がり確認","施工前後写真の撮影・提出","不備がある場合は無償再対応を実施","作業当日中に報告書を提出"];
const STEPS=["基本情報","チェック","写真","特記・出力"];
const IS={width:"100%",border:`1.5px solid ${MID}`,borderRadius:8,padding:"10px 12px",fontSize:14,color:NAVY,background:"#fff",outline:"none",fontFamily:"inherit"};
const LS={display:"block",fontSize:11,fontWeight:700,color:NAVY,marginBottom:4,letterSpacing:0.5};
const CS={background:"#fff",borderRadius:14,marginBottom:14,overflow:"hidden",boxShadow:"0 2px 12px rgba(26,58,92,0.07)"};
function CardHead({label}){return <div style={{background:NAVY,padding:"10px 16px"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>{label}</span></div>;}
function Field({label,value,onChange,type,placeholder}){return(<div style={{marginBottom:14}}><label style={LS}>{label}</label><input type={type||"text"} value={value} placeholder={placeholder||""} onChange={onChange} style={IS}/></div>);}
function AppHeader({step,setStep}){return(<div style={{background:NAVY,padding:"16px 20px 12px",position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{color:GOLD,fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:2}}>夢街美装</div><div style={{color:"#fff",fontSize:18,fontWeight:800}}>作業完了報告書</div></div><div style={{width:44,height:44,borderRadius:"50%",border:`2px solid ${GOLD}`,display:"flex",alignItems:"center",justifyContent:"center",color:GOLD,fontSize:20}}>✓</div></div><div style={{display:"flex",gap:4,marginTop:14}}>{STEPS.map((s,i)=>(<div key={i} onClick={()=>setStep(i)} style={{flex:1,textAlign:"center",paddingBottom:6,cursor:"pointer",borderBottom:`3px solid ${i===step?GOLD:"rgba(255,255,255,0.2)"}`}}><span style={{color:i===step?GOLD:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700}}>{s}</span></div>))}</div></div>);}
function PhotoSlot({side,value,onChange}){const ref=useRef();const onFile=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);};const isBefore=side==="before";return(<div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:isBefore?"#fff":NAVY,background:isBefore?"#8A9BB0":GOLD,textAlign:"center",padding:"5px 0",borderRadius:"6px 6px 0 0",letterSpacing:1}}>{isBefore?"施工前":"施工後"}</div><div onClick={()=>ref.current.click()} style={{background:value?"transparent":isBefore?"#E4EBF4":"#EEF5EC",border:`1.5px dashed ${isBefore?"#B5C5D8":"#A5C4A0"}`,borderTop:"none",borderRadius:"0 0 6px 6px",height:130,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative"}}>{value?(<><img src={value} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",bottom:4,right:4,background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:10,borderRadius:4,padding:"2px 6px"}}>タップで変更</div></>):(<><span style={{fontSize:28,marginBottom:4}}>🖼️</span><span style={{fontSize:11,color:"#8A9BB0"}}>写真を追加</span></>)}<input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/></div></async function generatePptx(info,checked,quality,acCount,photos,notes){
  const pres=new PptxGenJS();
  pres.layout="LAYOUT_16x9";
  pres.title=`完了報告書_${info.property||"物件"}`;
  const W="FFFFFF",N="1a3a5c",G="C9A557",GR="8A9BB0";
  const dateStr=info.date?new Date(info.date).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"}):"　年　月　日";
  const timeStr=info.timeFrom&&info.timeTo?`${info.timeFrom}〜${info.timeTo}`:"　時〜　時";
  const ft=s=>{s.addShape(pres.shapes.RECTANGLE,{x:0,y:5.25,w:10,h:0.375,fill:{color:N},line:{color:N,width:0}});s.addText("夢街美装　|　TEL 054-298-7605　|　yumemachibisou.com",{x:0.3,y:5.25,w:9.4,h:0.375,fontSize:8,color:GR,valign:"middle",fontFace:"Calibri",margin:0});};
  const hd=(s,t,sub)=>{s.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.85,fill:{color:N},line:{color:N,width:0}});s.addShape(pres.shapes.RECTANGLE,{x:0,y:0.85,w:10,h:0.06,fill:{color:G},line:{color:G,width:0}});s.addText(t,{x:0.35,y:0,w:7,h:0.85,fontSize:22,color:W,bold:true,valign:"middle",fontFace:"Calibri",margin:0});s.addText(sub,{x:6.5,y:0,w:3.2,h:0.85,fontSize:11,color:G,italic:true,align:"right",valign:"middle",fontFace:"Calibri",margin:0});};
  {const s=pres.addSlide();s.background={color:N};s.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:0.12,h:5.625,fill:{color:G},line:{color:G,width:0}});s.addShape(pres.shapes.RECTANGLE,{x:8.5,y:0,w:1.5,h:5.625,fill:{color:"0d2137"},line:{color:"0d2137",width:0}});s.addShape(pres.shapes.RECTANGLE,{x:0.45,y:1.6,w:3.8,h:0.04,fill:{color:G},line:{color:G,width:0}});s.addShape(pres.shapes.RECTANGLE,{x:0.45,y:3.5,w:3.8,h:0.04,fill:{color:G},line:{color:G,width:0}});s.addText("夢街美装 / Yumemachi Bisou",{x:0.45,y:0.45,w:5.5,h:0.4,fontSize:11,color:G,bold:true,charSpacing:3,fontFace:"Calibri",margin:0});s.addText("作業完了報告書",{x:0.45,y:1.75,w:7.5,h:1.1,fontSize:44,color:W,bold:true,fontFace:"Calibri",margin:0});s.addText("Completion Report",{x:0.45,y:2.7,w:5,h:0.45,fontSize:16,color:G,italic:true,fontFace:"Calibri",charSpacing:4,margin:0});[["物件",info.property||"（物件名）"],["日付",dateStr],["担当",info.worker||"（担当者名）"]].forEach((t,i)=>{const y=3.6+i*0.45;s.addText(t[0],{x:0.45,y,w:0.75,h:0.38,fontSize:10,color:N,bold:true,fill:{color:G},align:"center",valign:"middle",margin:0,fontFace:"Calibri"});s.addText(t[1],{x:1.25,y,w:4.0,h:0.38,fontSize:11,color:W,fontFace:"Calibri",margin:[0,0,0,8]});});s.addText("TEL: 054-298-7605\nyumemachibisou.com",{x:6.6,y:4.8,w:3.2,h:0.6,fontSize:9,color:GR,align:"right",fontFace:"Calibri",margin:0});}
  {const s=pres.addSlide();s.background={color:"F4F7FA"};hd(s,"作業概要","Job Summary");[["物件名",info.property||""],["所在地",info.address||""],["作業日時",`${dateStr}　${timeStr}`],["依頼担当者",info.client||""],["作業担当者",info.worker||""]].forEach((row,i)=>{const y=1.15+i*0.73;s.addShape(pres.shapes.RECTANGLE,{x:0.35,y,w:9.3,h:0.6,fill:{color:i%2===0?W:"E8EFF7"},line:{color:"D0DAEA",width:1}});s.addText(row[0],{x:0.95,y,w:1.5,h:0.6,fontSize:11,color:N,bold:true,valign:"middle",fontFace:"Calibri",margin:0});s.addShape(pres.shapes.RECTANGLE,{x:2.45,y:y+0.12,w:0.02,h:0.36,fill:{color:G},line:{color:G,width:0}});s.addText(row[1],{x:2.55,y,w:6.8,h:0.6,fontSize:11,color:N,valign:"middle",fontFace:"Calibri",margin:[0,0,0,8]});});ft(s);}
  {const s=pres.addSlide();s.background={color:"F4F7FA"};hd(s,"作業内容チェックリスト","Work Checklist");[["水回り清掃",LEFT_ITEMS,0.35],["居室・共用部",RIGHT_ITEMS,5.1]].forEach(([title,items,cx])=>{s.addShape(pres.shapes.RECTANGLE,{x:cx,y:1.05,w:4.55,h:0.45,fill:{color:N},line:{color:N,width:0}});s.addText(title,{x:cx+0.1,y:1.05,w:4.35,h:0.45,fontSize:12,color:W,bold:true,valign:"middle",fontFace:"Calibri",margin:0});items.forEach((item,i)=>{const y=1.55+i*0.37;const isAc=item==="エアコン清掃";const label=isAc?`エアコン清掃（${acCount||"　　"}台）`:item;const isDone=checked[item];s.addShape(pres.shapes.RECTANGLE,{x:cx,y,w:4.55,h:0.37,fill:{color:i%2===0?W:"E8EFF7"},line:{color:"D0DAEA",width:1}});s.addShape(pres.shapes.RECTANGLE,{x:cx+0.1,y:y+0.08,w:0.22,h:0.22,fill:{color:isDone?G:W},line:{color:isDone?G:"C0CEDC",width:1.5}});if(isDone)s.addText("✓",{x:cx+0.1,y:y+0.04,w:0.22,h:0.28,fontSize:12,color:W,bold:true,align:"center",margin:0});s.addText(label,{x:cx+0.4,y,w:4.0,h:0.37,fontSize:10,color:isDone?GR:N,valign:"middle",fontFace:"Calibri",margin:0});});});ft(s);}
  {const s=pres.addSlide();s.background={color:"F4F7FA"};hd(s,"施工前後 写真記録","Before / After Photos");["施工前 (Before)","施工後 (After)"].forEach((lbl,ci)=>{const x=0.35+ci*4.85;s.addShape(pres.shapes.RECTANGLE,{x,y:1.05,w:4.45,h:0.38,fill:{color:ci===0?"8A9BB0":G},line:{color:ci===0?"8A9BB0":G,width:0}});s.addText(lbl,{x,y:1.05,w:4.45,h:0.38,fontSize:12,color:W,bold:true,align:"center",valign:"middle",fontFace:"Calibri",margin:0});});for(const [idx,label,y] of [[0,"箇所①",1.48],[1,"箇所②",3.45]]){for(let ci=0;ci<2;ci++){const x=0.35+ci*4.85;const pd=ci===0?photos[idx]?.before:photos[idx]?.after;s.addShape(pres.shapes.RECTANGLE,{x,y,w:4.45,h:1.9,fill:{color:ci===0?"E0E7EF":"EEF4F0"},line:{color:ci===0?"B0BEC5":"A5C4AD",width:1.5}});if(pd){const b64=pd.split(",")[1];const mime=pd.split(";")[0].split(":")[1];s.addImage({data:`${mime};base64,${b64}`,x:x+0.05,y:y+0.05,w:4.35,h:1.8,sizing:{type:"contain",w:4.35,h:1.8}});}else{s.addText(ci===0?"施工前写真を添付":"施工後写真を添付",{x,y:y+0.7,w:4.45,h:0.5,fontSize:10,color:GR,align:"center",fontFace:"Calibri",margin:0});}if(ci===0)s.addText(label,{x:x+0.06,y:y+0.06,w:0.8,h:0.28,fontSize:8,color:W,bold:true,align:"center",valign:"middle",fill:{color:N},margin:0,fontFace:"Calibri"});}}ft(s);}
  {const s=pres.addSlide();s.background={color:"F4F7FA"};hd(s,"特記事項・完了確認","Notes & Sign-off");s.addShape(pres.shapes.RECTANGLE,{x:0.35,y:1.05,w:9.3,h:0.36,fill:{color:N},line:{color:N,width:0}});s.addText("特記事項（不具合・追加対応・確認事項など）",{x:0.45,y:1.05,w:9.1,h:0.36,fontSize:11,color:W,bold:true,valign:"middle",fontFace:"Calibri",margin:0});s.addShape(pres.shapes.RECTANGLE,{x:0.35,y:1.41,w:9.3,h:0.9,fill:{color:W},line:{color:"D0DAEA",width:1}});if(notes)s.addText(notes,{x:0.45,y:1.45,w:9.1,h:0.82,fontSize:10,color:N,fontFace:"Calibri",margin:0});s.addShape(pres.shapes.RECTANGLE,{x:0.35,y:2.4,w:9.3,h:0.36,fill:{color:N},line:{color:N,width:0}});s.addText("品質確認チェック",{x:0.45,y:2.4,w:9.1,h:0.36,fontSize:11,color:W,bold:true,valign:"middle",fontFace:"Calibri",margin:0});QUALITY_ITEMS.forEach((item,i)=>{const y=2.82+i*0.38;const done=quality[item];s.addShape(pres.shapes.RECTANGLE,{x:0.35,y,w:9.3,h:0.36,fill:{color:i%2===0?W:"E8EFF7"},line:{color:"D0DAEA",width:1}});s.addShape(pres.shapes.RECTANGLE,{x:0.45,y:y+0.07,w:0.22,h:0.22,fill:{color:done?G:W},line:{color:done?G:"C0CEDC",width:1.5}});if(done)s.addText("✓",{x:0.45,y:y+0.03,w:0.22,h:0.28,fontSize:12,color:W,bold:true,align:"center",margin:0});s.addText(item,{x:0.75,y,w:8.7,h:0.36,fontSize:10,color:N,valign:"middle",fontFace:"Calibri",margin:0});});[["作業担当者署名",0.35],["確認者署名（翌日確認担当）",5.35]].forEach(([lbl,x])=>{s.addShape(pres.shapes.RECTANGLE,{x,y:4.42,w:4.3,h:0.6,fill:{color:W},line:{color:"D0DAEA",width:1}});s.addText(lbl,{x:x+0.1,y:4.45,w:4.1,h:0.25,fontSize:9,color:GR,fontFace:"Calibri",margin:0});s.addShape(pres.shapes.RECTANGLE,{x:x+0.1,y:4.82,w:3.2,h:0.02,fill:{color:N},line:{color:N,width:0}});});ft(s);}
  await pres.writeFile({fileName:`完了報告書_${info.property||"物件"}_${info.date||"日付未入力"}.pptx`});
}
function App(){
  const [step,setStep]=useState(0);
  const [info,setInfo]=useState({property:"",address:"",date:"",timeFrom:"",timeTo:"",client:"",worker:""});
  const [checked,setChecked]=useState({});
  const [quality,setQuality]=useState({});
  const [acCount,setAcCount]=useState("");
  const [photos,setPhotos]=useState([{before:null,after:null},{before:null,after:null}]);
  const [notes,setNotes]=useState("");
  const [generating,setGenerating]=useState(false);
  const [done,setDone]=useState(false);
  const setI=(k)=>(e)=>setInfo(p=>({...p,[k]:e.target.value}));
  const toggle=k=>setChecked(p=>({...p,[k]:!p[k]}));
  const toggleQ=k=>setQuality(p=>({...p,[k]:!p[k]}));
  const setPhoto=(i,side,val)=>setPhotos(p=>p.map((r,idx)=>idx===i?{...r,[side]:val}:r));
  const count=ALL_ITEMS.filter(i=>checked[i]).length;
  const progress=Math.round(count/ALL_ITEMS.length*100);
  const handleGenerate=async()=>{setGenerating(true);try{await generatePptx(info,checked,quality,acCount,photos,notes);setDone(true);}catch(e){alert("エラー: "+e.message);}setGenerating(false);};
  const reset=()=>{setDone(false);setStep(0);setInfo({property:"",address:"",date:"",timeFrom:"",timeTo:"",client:"",worker:""});setChecked({});setQuality({});setAcCount("");setPhotos([{before:null,after:null},{before:null,after:null}]);setNotes("");};
  if(done)return(<div style={{minHeight:"100vh",background:NAVY,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}><div style={{fontSize:70,marginBottom:16}}>📄</div><div style={{color:GOLD,fontSize:22,fontWeight:800,marginBottom:8}}>PPTXが保存されました！</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:13,marginBottom:8}}>{info.property} の完了報告書</div><div style={{color:"rgba(255,255,255,0.5)",fontSize:12,marginBottom:32}}>ダウンロードフォルダを確認してください</div><button onClick={reset} style={{padding:"14px 32px",borderRadius:12,border:`2px solid ${GOLD}`,background:"transparent",color:GOLD,fontWeight:700,fontSize:15,cursor:"pointer"}}>＋ 次の報告書を作成</button></div>);
  return(<div style={{minHeight:"100vh",background:LIGHT,maxWidth:480,margin:"0 auto"}}><AppHeader step={step} setStep={setStep}/>
  {step===0&&(<div style={{padding:"20px 20px 0"}}><div style={CS}><div style={{padding:18}}><Field label="物件名" value={info.property} onChange={setI("property")} placeholder="例）グリーンハイツ101"/><Field label="所在地" value={info.address} onChange={setI("address")} placeholder="例）静岡市葵区..."/><Field label="作業日" type="date" value={info.date} onChange={setI("date")}/><div style={{display:"flex",gap:10,marginBottom:14}}><div style={{flex:1}}><label style={LS}>開始時刻</label><input type="time" value={info.timeFrom} onChange={setI("timeFrom")} style={IS}/></div><div style={{flex:1}}><label style={LS}>終了時刻</label><input type="time" value={info.timeTo} onChange={setI("timeTo")} style={IS}/></div></div><Field label="依頼担当者名" value={info.client} onChange={setI("client")} placeholder="不動産会社 担当者名"/><Field label="作業担当者名" value={info.worker} onChange={setI("worker")} placeholder="夢街美装 担当者名"/></div></div><div style={{paddingBottom:24}}><button onClick={()=>setStep(1)} style={{width:"100%",padding:"14px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>チェックリストへ →</button></div></div>)}
  {step===1&&(<div style={{padding:"20px 20px 0"}}><div style={{...CS,padding:"14px 16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:NAVY,fontWeight:700}}>完了項目</span><span style={{fontSize:13,fontWeight:800,color:GOLD}}>{count} / {ALL_ITEMS.length}</span></div><div style={{background:MID,borderRadius:99,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`,borderRadius:99,transition:"width .3s"}}/></div></div>{[["💧 水回り清掃",LEFT_ITEMS],["🏠 居室・共用部",RIGHT_ITEMS]].map(([title,items])=>(<div key={title} style={CS}><CardHead label={title}/>{items.map((item,i)=>item==="エアコン清掃"?(<div key={item} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<items.length-1?`1px solid ${MID}`:"none"}}><div onClick={()=>toggle(item)} style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${checked[item]?GOLD:"#C0CEDC"}`,background:checked[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s"}}>{checked[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span onClick={()=>toggle(item)} style={{fontSize:13,color:NAVY,flex:1,cursor:"pointer"}}>エアコン清掃</span><div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" min="0" max="99" value={acCount} placeholder="0" onChange={e=>{setAcCount(e.target.value);if(e.target.value)setChecked(p=>({...p,[item]:true}));}} onClick={e=>e.stopPropagation()} style={{width:44,textAlign:"center",border:`1.5px solid ${MID}`,borderRadius:6,padding:"5px 4px",fontSize:14,color:NAVY,background:"#fff",outline:"none"}}/><span style={{fontSize:12,color:NAVY}}>台</span></div></div>):(<div key={item} onClick={()=>toggle(item)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<items.length-1?`1px solid ${MID}`:"none",cursor:"pointer"}}><div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${checked[item]?GOLD:"#C0CEDC"}`,background:checked[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{checked[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span style={{fontSize:13,color:checked[item]?"#8A9BB0":NAVY,textDecoration:checked[item]?"line-through":"none",transition:"all .15s"}}>{item}</span></div>))}</div>))}<div style={{display:"flex",gap:10,paddingBottom:24}}><button onClick={()=>setStep(0)} style={{flex:1,padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={()=>setStep(2)} style={{flex:2,padding:"13px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>写真へ →</button></div></div>)}
  {step===2&&(<div style={{padding:"20px 20px 0"}}><p style={{fontSize:12,color:"#8A9BB0",marginBottom:16}}>各箇所の施工前・後の写真を追加してください</p>{photos.map((row,i)=>(<div key={i} style={CS}><div style={{background:NAVY,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}><div style={{width:26,height:26,borderRadius:"50%",background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",color:NAVY,fontWeight:800,fontSize:12}}>{i+1}</div><span style={{color:"#fff",fontWeight:700,fontSize:13}}>箇所 {i+1}</span></div><div style={{padding:14,display:"flex",gap:10}}><PhotoSlot side="before" value={row.before} onChange={v=>setPhoto(i,"before",v)}/><PhotoSlot side="after" value={row.after} onChange={v=>setPhoto(i,"after",v)}/></div></div>))}<div style={{display:"flex",gap:10,paddingBottom:24}}><button onClick={()=>setStep(1)} style={{flex:1,padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={()=>setStep(3)} style={{flex:2,padding:"13px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>特記・出力へ →</button></div></div>)}
  {step===3&&(<div style={{padding:"20px 20px 0"}}><div style={CS}><CardHead label="📝 特記事項"/><div style={{padding:14}}><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="不具合・追加対応・確認事項などをご記入ください" rows={4} style={{width:"100%",border:`1.5px solid ${MID}`,borderRadius:8,padding:"10px 12px",fontSize:13,color:NAVY,background:LIGHT,outline:"none",resize:"none",lineHeight:1.7}}/></div></div><div style={CS}><CardHead label="🛡 品質確認チェック"/>{QUALITY_ITEMS.map((item,i)=>(<div key={item} onClick={()=>toggleQ(item)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<QUALITY_ITEMS.length-1?`1px solid ${MID}`:"none",cursor:"pointer"}}><div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${quality[item]?GOLD:"#C0CEDC"}`,background:quality[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{quality[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span style={{fontSize:13,color:NAVY}}>{item}</span></div>))}</div><div style={{background:NAVY,borderRadius:14,padding:18,marginBottom:20}}><div style={{color:GOLD,fontWeight:800,fontSize:13,marginBottom:12}}>📋 出力内容の確認</div>{[["物件名",info.property||"—"],["作業日",info.date?new Date(info.date).toLocaleDateString("ja-JP"):"—"],["担当者",info.worker||"—"],["チェック",`${count}/${ALL_ITEMS.length}項目完了`],["エアコン",acCount?`${acCount}台`:"—"],["写真",`${photos.filter(p=>p.before||p.after).length}箇所`]].map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}><span style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{k}</span><span style={{color:"#fff",fontSize:12,fontWeight:700}}>{v}</span></div>))}</div><div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:32}}><button onClick={()=>setStep(2)} style={{padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={handleGenerate} disabled={generating} style={{padding:"18px 0",borderRadius:12,border:"none",background:generating?"#8A9BB0":`linear-gradient(135deg,${NAVY},#2a5a8c)`,color:"#fff",fontWeight:800,fontSize:16,cursor:generating?"not-allowed":"pointer",boxShadow:generating?"none":`0 4px 20px rgba(26,58,92,0.35)`,letterSpacing:0.5}}>{generating?"生成中...":"📄　完了報告書PPTXを出力する"}</button><p style={{fontSize:11,color:"#8A9BB0",textAlign:"center",lineHeight:1.6}}>ボタンを押すとPPTXがダウンロードされます<br/>そのままLINEやメールで送れます</p></div></div>)}
  <div style={{textAlign:"center",paddingBottom:20,color:"#B0BFCF",fontSize:10}}>夢街美装　TEL 054-298-7605</div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
