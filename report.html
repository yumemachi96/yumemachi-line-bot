<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a5c">
<title>作業完了報告書 | 夢街美装</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #F4F7FA; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }
  input, textarea, button { font-family: inherit; }
  input[type=number]::-webkit-inner-spin-button { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;
const NAVY = "#1a3a5c";
const GOLD = "#C9A557";
const LIGHT = "#F4F7FA";
const MID  = "#E8EFF7";
const LEFT_ITEMS = ["浴槽・浴室床・壁・扉レール","換気扇（浴室）・鏡","洗面ボウル・蛇口・鏡","排水口・収納外面","便器・タンク・床・壁","換気扇（トイレ）","レンジフード・コンロ","シンク・扉面"];
const RIGHT_ITEMS = ["床クリーニング・ワックス仕上げ","窓ガラス・窓枠全箇所","クローゼット内清掃","玄関タイル・下駄箱・ドア面","共用部廊下・エントランス","エアコン清掃","鍵交換","入居前設備チェック・記録"];
const ALL_ITEMS = [...LEFT_ITEMS, ...RIGHT_ITEMS];
const QUALITY_ITEMS = ["翌日担当者による仕上がり確認","施工前後写真の撮影・提出","不備がある場合は無償再対応を実施","作業当日中に報告書を提出"];
const STEPS = ["基本情報","チェック","写真","特記・送信"];
function PhotoSlot({ side, value, onChange }) {
  const ref = useRef();
  const onFile = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => onChange(ev.target.result, f); r.readAsDataURL(f); };
  const isBefore = side === "before";
  return (<div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:isBefore?"#fff":NAVY,background:isBefore?"#8A9BB0":GOLD,textAlign:"center",padding:"5px 0",borderRadius:"6px 6px 0 0",letterSpacing:1}}>{isBefore?"施工前":"施工後"}</div><div onClick={()=>ref.current.click()} style={{background:value?"transparent":isBefore?"#E4EBF4":"#EEF5EC",border:`1.5px dashed ${isBefore?"#B5C5D8":"#A5C4A0"}`,borderTop:"none",borderRadius:"0 0 6px 6px",height:130,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative"}}>{value?(<><img src={value} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><div style={{position:"absolute",bottom:4,right:4,background:"rgba(0,0,0,0.55)",color:"#fff",fontSize:10,borderRadius:4,padding:"2px 6px"}}>タップで変更</div></>):(<><span style={{fontSize:28,marginBottom:4}}>🖼️</span><span style={{fontSize:11,color:"#8A9BB0"}}>写真を追加</span></>)}<input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={onFile}/></div></div>);
}
function App() {
  const [step,setStep]=useState(0);
  const [info,setInfo]=useState({property:"",address:"",date:"",timeFrom:"",timeTo:"",client:"",worker:""});
  const [checked,setChecked]=useState({});
  const [quality,setQuality]=useState({});
  const [acCount,setAcCount]=useState("");
  const [photos,setPhotos]=useState([{before:null,beforeFile:null,after:null,afterFile:null},{before:null,beforeFile:null,after:null,afterFile:null}]);
  const [notes,setNotes]=useState("");
  const [sharing,setSharing]=useState(false);
  const [shared,setShared]=useState(false);
  const [copied,setCopied]=useState(false);
  const toggle=k=>setChecked(p=>({...p,[k]:!p[k]}));
  const toggleQ=k=>setQuality(p=>({...p,[k]:!p[k]}));
  const setPhoto=(i,side,val,file)=>setPhotos(p=>p.map((r,idx)=>idx===i?{...r,[side]:val,[`${side}File`]:file}:r));
  const count=ALL_ITEMS.filter(i=>checked[i]).length;
  const progress=Math.round(count/ALL_ITEMS.length*100);
  const buildText=()=>{const d=info.date?new Date(info.date).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"}):"未入力";const t=info.timeFrom&&info.timeTo?`${info.timeFrom}〜${info.timeTo}`:info.timeFrom||"未入力";const pc=photos.filter(p=>p.before||p.after).length;return `━━━━━━━━━━━━━━━━━━━━\n🏢 夢街美装｜作業完了報告書\n━━━━━━━━━━━━━━━━━━━━\n\n【基本情報】\n物件名：${info.property||"未入力"}\n所在地：${info.address||"未入力"}\n作業日：${d}\n作業時間：${t}\n依頼担当者：${info.client||"未入力"}\n作業担当者：${info.worker||"未入力"}\n\n【作業チェック】（${count}/${ALL_ITEMS.length}完了）\n▼ 水回り\n${LEFT_ITEMS.map(i=>`${checked[i]?"✅":"☐"} ${i}`).join("\n")}\n\n▼ 居室・共用部\n${RIGHT_ITEMS.map(i=>i==="エアコン清掃"?`${checked[i]?"✅":"☐"} エアコン清掃（${acCount||"0"}台）`:`${checked[i]?"✅":"☐"} ${i}`).join("\n")}\n\n【品質確認】\n${QUALITY_ITEMS.map(q=>`${quality[q]?"✅":"☐"} ${q}`).join("\n")}\n\n【特記事項】\n${notes||"なし"}\n\n【写真】施工前後：${pc}箇所分を添付\n\n━━━━━━━━━━━━━━━━━━━━\nTEL 054-298-7605 | yumemachibisou.com\n━━━━━━━━━━━━━━━━━━━━`;};
  const handleShare=async()=>{setSharing(true);const text=buildText();const title=`完了報告書｜${info.property||"物件名未入力"}`;const files=[];photos.forEach((r,i)=>{if(r.beforeFile)files.push(new File([r.beforeFile],`箇所${i+1}_施工前.jpg`,{type:r.beforeFile.type}));if(r.afterFile)files.push(new File([r.afterFile],`箇所${i+1}_施工後.jpg`,{type:r.afterFile.type}));});try{if(navigator.share){const data={title,text};if(files.length>0&&navigator.canShare&&navigator.canShare({files}))data.files=files;await navigator.share(data);setShared(true);}else{await navigator.clipboard.writeText(text);setCopied(true);setTimeout(()=>setCopied(false),4000);}}catch(e){if(e.name!=="AbortError"){await navigator.clipboard.writeText(text).catch(()=>{});setCopied(true);setTimeout(()=>setCopied(false),4000);}}setSharing(false);};
  const reset=()=>{setShared(false);setStep(0);setInfo({property:"",address:"",date:"",timeFrom:"",timeTo:"",client:"",worker:""});setChecked({});setQuality({});setAcCount("");setPhotos([{before:null,beforeFile:null,after:null,afterFile:null},{before:null,beforeFile:null,after:null,afterFile:null}]);setNotes("");};
  const IS={width:"100%",border:`1.5px solid ${MID}`,borderRadius:8,padding:"10px 12px",fontSize:14,color:NAVY,background:"#fff",outline:"none",fontFamily:"inherit"};
  const LS={display:"block",fontSize:11,fontWeight:700,color:NAVY,marginBottom:4,letterSpacing:0.5};
  const CS={background:"#fff",borderRadius:14,marginBottom:14,overflow:"hidden",boxShadow:"0 2px 12px rgba(26,58,92,0.07)"};
  const CH=label=><div style={{background:NAVY,padding:"10px 16px"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>{label}</span></div>;
  const Field=({label,k,type="text",placeholder=""})=>(<div style={{marginBottom:14}}><label style={LS}>{label}</label><input type={type} value={info[k]} placeholder={placeholder} onChange={e=>setInfo(p=>({...p,[k]:e.target.value}))} style={IS}/></div>);
  const Header=()=>(<div style={{background:NAVY,padding:"16px 20px 12px",position:"sticky",top:0,zIndex:10}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{color:GOLD,fontSize:10,fontWeight:700,letterSpacing:2,marginBottom:2}}>夢街美装</div><div style={{color:"#fff",fontSize:18,fontWeight:800}}>作業完了報告書</div></div><div style={{width:44,height:44,borderRadius:"50%",border:`2px solid ${GOLD}`,display:"flex",alignItems:"center",justifyContent:"center",color:GOLD,fontSize:20}}>✓</div></div><div style={{display:"flex",gap:4,marginTop:14}}>{STEPS.map((s,i)=>(<div key={i} onClick={()=>setStep(i)} style={{flex:1,textAlign:"center",paddingBottom:6,cursor:"pointer",borderBottom:`3px solid ${i===step?GOLD:"rgba(255,255,255,0.2)"}`}}><span style={{color:i===step?GOLD:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700}}>{s}</span></div>))}</div></div>);
  if(shared)return(<div style={{minHeight:"100vh",background:NAVY,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:32,textAlign:"center"}}><div style={{fontSize:70,marginBottom:16}}>📤</div><div style={{color:GOLD,fontSize:22,fontWeight:800,marginBottom:8}}>送信完了！</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:13,marginBottom:32}}>{info.property} の報告書を送信しました</div><button onClick={reset} style={{padding:"14px 32px",borderRadius:12,border:`2px solid ${GOLD}`,background:"transparent",color:GOLD,fontWeight:700,fontSize:15,cursor:"pointer"}}>＋ 次の報告書を作成</button></div>);
  return(<div style={{minHeight:"100vh",background:LIGHT,maxWidth:480,margin:"0 auto"}}><Header/>{step===0&&(<div style={{padding:"20px 20px 0"}}><div style={CS}><div style={{padding:18}}><Field label="物件名" k="property" placeholder="例）グリーンハイツ101"/><Field label="所在地" k="address" placeholder="例）静岡市葵区..."/><Field label="作業日" k="date" type="date"/><div style={{display:"flex",gap:10,marginBottom:14}}>{[["開始時刻","timeFrom"],["終了時刻","timeTo"]].map(([l,k])=>(<div key={k} style={{flex:1}}><label style={LS}>{l}</label><input type="time" value={info[k]} onChange={e=>setInfo(p=>({...p,[k]:e.target.value}))} style={IS}/></div>))}</div><Field label="依頼担当者名" k="client" placeholder="不動産会社 担当者名"/><Field label="作業担当者名" k="worker" placeholder="夢街美装 担当者名"/></div></div><div style={{paddingBottom:24}}><button onClick={()=>setStep(1)} style={{width:"100%",padding:"14px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>チェックリストへ →</button></div></div>)}{step===1&&(<div style={{padding:"20px 20px 0"}}><div style={{...CS,padding:"14px 16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:12,color:NAVY,fontWeight:700}}>完了項目</span><span style={{fontSize:13,fontWeight:800,color:GOLD}}>{count} / {ALL_ITEMS.length}</span></div><div style={{background:MID,borderRadius:99,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${NAVY},${GOLD})`,borderRadius:99,transition:"width .3s"}}/></div></div>{[["💧 水回り清掃",LEFT_ITEMS],["🏠 居室・共用部",RIGHT_ITEMS]].map(([title,items])=>(<div key={title} style={CS}>{CH(title)}{items.map((item,i)=>item==="エアコン清掃"?(<div key={item} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<items.length-1?`1px solid ${MID}`:"none"}}><div onClick={()=>toggle(item)} style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${checked[item]?GOLD:"#C0CEDC"}`,background:checked[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .15s"}}>{checked[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span onClick={()=>toggle(item)} style={{fontSize:13,color:NAVY,flex:1,cursor:"pointer"}}>エアコン清掃</span><div style={{display:"flex",alignItems:"center",gap:4}}><input type="number" min="0" max="99" value={acCount} placeholder="0" onChange={e=>{setAcCount(e.target.value);if(e.target.value)setChecked(p=>({...p,[item]:true}));}} onClick={e=>e.stopPropagation()} style={{width:44,textAlign:"center",border:`1.5px solid ${MID}`,borderRadius:6,padding:"5px 4px",fontSize:14,color:NAVY,background:"#fff",outline:"none"}}/><span style={{fontSize:12,color:NAVY}}>台</span></div></div>):(<div key={item} onClick={()=>toggle(item)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<items.length-1?`1px solid ${MID}`:"none",cursor:"pointer"}}><div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${checked[item]?GOLD:"#C0CEDC"}`,background:checked[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{checked[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span style={{fontSize:13,color:checked[item]?"#8A9BB0":NAVY,textDecoration:checked[item]?"line-through":"none",transition:"all .15s"}}>{item}</span></div>))}</div>))}<div style={{display:"flex",gap:10,paddingBottom:24}}><button onClick={()=>setStep(0)} style={{flex:1,padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={()=>setStep(2)} style={{flex:2,padding:"13px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>写真へ →</button></div></div>)}{step===2&&(<div style={{padding:"20px 20px 0"}}><p style={{fontSize:12,color:"#8A9BB0",marginBottom:16}}>各箇所の施工前・後の写真を追加してください</p>{photos.map((row,i)=>(<div key={i} style={CS}><div style={{background:NAVY,padding:"10px 16px",display:"flex",alignItems:"center",gap:10}}><div style={{width:26,height:26,borderRadius:"50%",background:GOLD,display:"flex",alignItems:"center",justifyContent:"center",color:NAVY,fontWeight:800,fontSize:12}}>{i+1}</div><span style={{color:"#fff",fontWeight:700,fontSize:13}}>箇所 {i+1}</span></div><div style={{padding:14,display:"flex",gap:10}}><PhotoSlot side="before" value={row.before} onChange={(v,f)=>setPhoto(i,"before",v,f)}/><PhotoSlot side="after" value={row.after} onChange={(v,f)=>setPhoto(i,"after",v,f)}/></div></div>))}<div style={{display:"flex",gap:10,paddingBottom:24}}><button onClick={()=>setStep(1)} style={{flex:1,padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={()=>setStep(3)} style={{flex:2,padding:"13px 0",borderRadius:10,border:"none",background:NAVY,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>特記・送信へ →</button></div></div>)}{step===3&&(<div style={{padding:"20px 20px 0"}}><div style={CS}>{CH("📝 特記事項")}<div style={{padding:14}}><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="不具合・追加対応・確認事項などをご記入ください" rows={4} style={{width:"100%",border:`1.5px solid ${MID}`,borderRadius:8,padding:"10px 12px",fontSize:13,color:NAVY,background:LIGHT,outline:"none",resize:"none",lineHeight:1.7}}/></div></div><div style={CS}>{CH("🛡 品質確認チェック")}{QUALITY_ITEMS.map((item,i)=>(<div key={item} onClick={()=>toggleQ(item)} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:i%2===0?"#fff":LIGHT,borderBottom:i<QUALITY_ITEMS.length-1?`1px solid ${MID}`:"none",cursor:"pointer"}}><div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:`2px solid ${quality[item]?GOLD:"#C0CEDC"}`,background:quality[item]?GOLD:"#fff",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}}>{quality[item]&&<span style={{color:"#fff",fontSize:14,fontWeight:900,lineHeight:1}}>✓</span>}</div><span style={{fontSize:13,color:NAVY}}>{item}</span></div>))}</div><div style={{background:NAVY,borderRadius:14,padding:18,marginBottom:20}}><div style={{color:GOLD,fontWeight:800,fontSize:13,marginBottom:12}}>📋 送信内容の確認</div>{[["物件名",info.property||"—"],["作業日",info.date?new Date(info.date).toLocaleDateString("ja-JP"):"—"],["担当者",info.worker||"—"],["チェック",`${count}/${ALL_ITEMS.length}項目完了`],["エアコン",acCount?`${acCount}台`:"—"],["写真",`${photos.filter(p=>p.before||p.after).length}箇所添付`]].map(([k,v])=>(<div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}><span style={{color:"rgba(255,255,255,0.6)",fontSize:12}}>{k}</span><span style={{color:"#fff",fontSize:12,fontWeight:700}}>{v}</span></div>))}</div><div style={{display:"flex",flexDirection:"column",gap:10,paddingBottom:32}}><button onClick={()=>setStep(2)} style={{padding:"13px 0",borderRadius:10,border:`2px solid ${NAVY}`,background:"#fff",color:NAVY,fontWeight:700,fontSize:14,cursor:"pointer"}}>← 戻る</button><button onClick={handleShare} disabled={sharing} style={{padding:"18px 0",borderRadius:12,border:"none",background:sharing?"#8A9BB0":`linear-gradient(135deg,${NAVY},#2a5a8c)`,color:"#fff",fontWeight:800,fontSize:16,cursor:sharing?"not-allowed":"pointer",boxShadow:sharing?"none":`0 4px 20px rgba(26,58,92,0.35)`,letterSpacing:0.5}}>{sharing?"準備中...":"📤　LINEやメールで送信する"}</button>{copied&&(<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#2E7D32",textAlign:"center"}}>✅ テキストをコピーしました！<br/>LINEやメールに貼り付けて送ってください</div>)}<p style={{fontSize:11,color:"#8A9BB0",textAlign:"center",lineHeight:1.6}}>ボタンを押すとLINE・メール・他のアプリから<br/>選んで送れます（写真も同時に添付）</p></div></div>)}<div style={{textAlign:"center",paddingBottom:20,color:"#B0BFCF",fontSize:10}}>夢街美装　TEL 054-298-7605</div></div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
