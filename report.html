<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#F4F7FA;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;max-width:480px;margin:0 auto}
input,textarea,button{font-family:inherit}
.hdr{background:#1a3a5c;padding:16px 20px 12px;position:sticky;top:0;z-index:10}

.card{background:#fff;border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,58,92,0.07)}
.ch{background:#1a3a5c;padding:10px 16px;color:#fff;font-weight:700;font-size:13px}
.fi{margin-bottom:14px}
.fi label{display:block;font-size:11px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.fi input,.fi textarea{width:100%;border:1.5px solid #E8EFF7;border-radius:8px;padding:10px 12px;font-size:14px;color:#1a3a5c;background:#fff;outline:none}
.fi textarea{resize:none;line-height:1.7}
.r2{display:flex;gap:10px}

.btn{width:100%;padding:14px;border-radius:10px;border:none;background:#1a3a5c;color:#fff;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px;display:block}
.btn-o{background:#fff;border:2px solid #1a3a5c;color:#1a3a5c}
.btn-g{background:linear-gradient(135deg,#1a3a5c,#2a5a8c);font-size:16px;font-weight:800;padding:18px;box-shadow:0 4px 20px rgba(26,58,92,0.35)}
.br{display:flex;gap:10px;margin-top:4px}
.br .btn{margin-top:0}
.ci{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;border-bottom:1px solid #E8EFF7}
.ci:last-child{border-bottom:none}
.ci:nth-child(even){background:#F4F7FA}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #C0CEDC;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.on{background:#C9A557;border-color:#C9A557;color:#fff;font-size:14px;font-weight:900}
.cl{font-size:13px;color:#1a3a5c}
.cl.dn{color:#8A9BB0;text-decoration:line-through}
.ar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #E8EFF7}
.pb{background:#E8EFF7;border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.pf{height:100%;background:linear-gradient(90deg,#1a3a5c,#C9A557);border-radius:99px;transition:width .3s}
.pa{display:flex;gap:10px;padding:14px}
.ps{flex:1}
.pl{font-size:11px;font-weight:700;text-align:center;padding:5px 0;border-radius:6px 6px 0 0;letter-spacing:1px}
.pl.b{background:#8A9BB0;color:#fff}
.pl.a{background:#C9A557;color:#1a3a5c}
.px{height:130px;border-radius:0 0 6px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.px.b{background:#E4EBF4;border:1.5px dashed #B5C5D8;border-top:none}
.px.a{background:#EEF5EC;border:1.5px dashed #A5C4A0;border-top:none}
.px img{width:100%;height:100%;object-fit:cover}
.sm{background:#1a3a5c;border-radius:14px;padding:18px;margin-bottom:20px}
.sm-t{color:#C9A557;font-weight:800;font-size:13px;margin-bottom:12px}
.sm-r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.08)}
.sm-k{color:rgba(255,255,255,0.6);font-size:12px}
.sm-v{color:#fff;font-size:12px;font-weight:700}
.nt{font-size:11px;color:#8A9BB0;text-align:center;line-height:1.6;margin-top:10px}
.ft{text-align:center;padding-bottom:20px;color:#B0BFCF;font-size:10px}
#rv{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:100;overflow-y:auto}
.rvt{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#1a3a5c;position:sticky;top:0;z-index:10}
.rvt-tt{color:#C9A557;font-weight:800;font-size:14px}
.rvt-cl{background:transparent;border:1.5px solid #C9A557;color:#C9A557;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;cursor:pointer}
.rvt-pd{background:#C9A557;border:none;color:#1a3a5c;font-size:12px;font-weight:800;padding:6px 14px;border-radius:8px;cursor:@media print{.rvt{display:none!important}.hdr{display:none!important}.pg{display:none!important}#rv{position:static;overflow:visible}.rv-slide{page-break-after:always;page-break-inside:@media print{.rvt{display:none!important}.hdr{display:none!important}.pg{display:none!important}#rv{position:static;overflow:visible}.rv-slide{page-break-after:always;page-break-inside:avoid}}
@media print{.rvt{display:none!important}.hdr{display:none!important}.pg{display:none!important}#rv{position:static;overflow:visible}.rv-slide{page-break-after:always;page-break-inside:avoid}}


</style>
</head>
<body>
<div class="hdr">
<small>夢街美装</small>
<h1>作業完了報告書</h1>
<div class="steps">

<div class="card">
<div class="ch" style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;border-radius:50%;background:#C9A557;display:flex;align-items:center;justify-content:center;color:#1a3a5c;font-weight:800;font-size:12px">1</div>箇所 1</div>

</div>
<div class="card">
<div class="ch" style="display:flex;align-items:center;gap:10px"><div style="width:26px;height:26px;border-radius:50%;background:#C9A557;display:flex;align-items:center;justify-content:center;color:#1a3a5c;font-weight:800;font-size:12px">2</div>箇所 2</div>
<div class="pa">
<div class="ps"><div class="pl b">施工前</div><div class="px b" id="pb1" onclick="document.getElementById('b1').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="b1" accept="image/*" style="display:none" onchange="sp(this,'pb1','b1')"></div>
<div class="ps"><div class="pl a">施工後</div><div class="px a" id="pa1" onclick="document.getElementById('a1').click()"><div style="font-size:28px">🖼️</div><div style="font-size:11px;color:#8A9BB0">写真を追加</div></div><input type="file" id="a1" accept="image/*" style="display:none" onchange="sp(this,'pa1','a1')"></div>
</div>

<div class="br">
<button class="btn btn-o" onclick="gt(1)">← 戻る</button>

</div>
<div id="p3" class="pg">

<div style="padding:14px"><textarea id="notes" rows="4" placeholder="不具合・追加対応・確認事項などをご記入ください" style="width:100%;border:1.5px solid #E8EFF7;border-radius:8px;padding:10px 12px;font-size:13px;color:#1a3a5c;background:#F4F7FA;outline:none;resize:none;line-height:1.7"></textarea></div>
</div>
<div class="card"><div class="ch">🛡 品質確認チェック</div><div id="ql"></div></div>
<div class="sm">

<div class="sm-r"><span class="sm-k">物件名</span><span class="sm-v" id="sp">—</span></div>
<div class="sm-r"><span class="sm-k">作業日</span><span class="sm-v" id="sd">—</span></div>
<div class="sm-r"><span class="sm-k">担当者</span><span class="sm-v" id="sw">—</span></div>
<div class="sm-r"><span class="sm-k">チェック</span><span class="sm-v" id="sc">0/16項目</span></div>
<div class="sm-r"><span class="sm-k">エアコン</span><span class="sm-v" id="sa">—</span></div>
</div>
<div class="br"><button class="btn btn-o" onclick="gt(2)">← 戻る</button></div>
<button class="btn btn-g" style="margin-top:10px" onclick="sr()">📄　報告書を表示する</button>
<p class="nt">表示後に「PDF保存」ボタンを押してください</p>
</div>
<div id="rv">

</div>

<div id="rc"></div>
</div>

<script>
var L=['浴槽・浴室床・壁・扉レール','換気扇（浴室）・鏡','洗面ボウル・蛇口・鏡','排水口・収納外面','便器・タンク・床・壁','換気扇（トイレ）','レンジフード・コンロ','シンク・扉面'];
var R=['床クリーニング・ワックス仕上げ','窓ガラス・窓枠全箇所','クローゼット内清掃','玄関タイル・下駄箱・ドア面','共用部廊下・エントランス','エアコン清掃','鍵交換','入居前設備チェック・記録'];
var Q=['翌日担当者による仕上がり確認','施工前後写真の撮影・提出','不備がある場合は無償再対応を実施','作業当日中に報告書を提出'];
var ck={},ql={},pd={b0:null,a0:null,b1:null,a1:null};
function bl(items,id,ir){
var c=document.getElementById(id);
items.forEach(function(item,i){
var d=document.createElement('div');
if(item==='エアコン清掃'){
d.className='ar';
d.innerHTML='<div class="cb" id="acb"></div><span class="cl" style="flex:1">エアコン清掃</span><input type="number" id="acc" min="0" max="99" placeholder="0" style="width:44px;text-align:center;border:1.5px solid #E8EFF7;border-radius:6px;padding:5px 4px;font-size:14px;color:#1a3a5c;outline:none"><span style="font-size:12px;color:#1a3a5c;margin-left:4px">台</span>';
d.querySelector('#acb').onclick=function(e){e.stopPropagation();ti('エアコン清掃','acb',null);};
d.querySelector('.cl').onclick=function(e){e.stopPropagation();ti('エアコン清掃','acb',null);};
d.querySelector('input').onclick=function(e){e.stopPropagation();};
d.querySelector('input').oninput=function(){if(this.value){ck['エアコン清掃']=true;var b=document.getElementById('acb');b.classList.add('on');b.textContent='✓';}up();};
}else{
var ci='cb'+i+(ir?'r':'l');
var li='lb'+i+(ir?'r':'l');
d.className='ci';
d.innerHTML='<div class="cb" id="'+ci+'"></div><span class="cl" id="'+li+'">'+item+'</span>';
d.onclick=function(){ti(item,ci,li);};
}
c.appendChild(d);
});
}
function ti(item,ci,li){
ck[item]=!ck[item];
var b=document.getElementById(ci);
b.classList.toggle('on',ck[item]);
b.textContent=ck[item]?'✓':'';
if(li){var l=document.getElementById(li);if(l)l.classList.toggle('dn',ck[item]);}
up();
}
function up(){
var n=L.concat(R).filter(function(i){return ck[i];}).length;
document.getElementById('cnt').textContent=n+' / 16';
document.getElementById('pf').style.width=Math.round(n/16*100)+'%';
}
function bq(){
var c=document.getElementById('ql');
Q.forEach(function(item,i){
var d=document.createElement('div');
d.className='ci';
var ci='qb'+i;
d.innerHTML='<div class="cb" id="'+ci+'"></div><span class="cl">'+item+'</span>';
d.onclick=function(){ql[item]=!ql[item];var b=document.getElementById(ci);b.classList.toggle('on',ql[item]);b.textContent=ql[item]?'✓':'';};
c.appendChild(d);
});
}
function gt(n){
document.querySelectorAll('.pg').forEach(function(p,i){p.classList.toggle('on',i===n);});
document.querySelectorAll('.step').forEach(function(s,i){s.classList.toggle('on',i===n);});
if(n===3)us();
window.scrollTo(0,0);
}
function us(){
var d=document.getElementById('date').value;
document.getElementById('sp').textContent=document.getElementById('property').value||'—';
document.getElementById('sd').textContent=d?new Date(d).toLocaleDateString('ja-JP'):'—';
document.getElementById('sw').textContent=document.getElementById('worker').value||'—';
var n=L.concat(R).filter(function(i){return ck[i];}).length;
document.getElementById('sc').textContent=n+'/16項目完了';
var ac=document.getElementById('acc')?document.getElementById('acc').value:'';
document.getElementById('sa').textContent=ac?ac+'台':'—';
}
function sp(input,bid,key){
var file=input.files[0];if(!file)return;
var reader=new FileReader();
reader.onload=function(e){
pd[key]=e.target.result;
var box=document.getElementById(bid);
box.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;border-radius:4px;padding:2px 6px">タップで変更</div>';
box.onclick=function(){input.click();};
};
reader.readAsDataURL(file);
}
function sr(){
var prop=document.getElementById('property').value||'（物件名）';
var addr=document.getElementById('address').value||'';
var dt=document.getElementById('date').value;
var tf=document.getElementById('timeFrom').value;
var tt=document.getElementById('timeTo').value;
var cl=document.getElementById('client').value||'';
var wk=document.getElementById('worker').value||'';
var nt=document.getElementById('notes').value||'なし';
var ac=document.getElementById('acc')?document.getElementById('acc').value:'';
var ds=dt?new Date(dt).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}):'　年　月　日';
var ts=tf&&tt?tf+'〜'+tt:'　時〜　時';
var h='';
h+='<div style="background:#1a3a5c;min-height:260px;overflow:hidden;position:relative;padding:28px 24px 24px 20px">';
h+='<div style="position:absolute;left:0;top:0;width:8px;height:100%;background:#C9A557"></div>';
h+='<div style="position:absolute;right:0;top:0;width:70px;height:100%;background:#0d2137"></div>';
h+='<div style="color:#C9A557;font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:8px">夢街美装 / Yumemachi Bisou</div>';
h+='<div style="color:#fff;font-size:32px;font-weight:800;margin-bottom:4px">作業完了報告書</div>';
h+='<div style="color:#C9A557;font-size:12px;font-style:italic;margin-bottom:20px">Completion Report</div>';
h+='<div style="height:2px;background:#C9A557;width:180px;margin-bottom:16px"></div>';
[['物件',prop],['日付',ds],['担当',wk||'（担当者名）']].forEach(function(t){
h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px"><div style="background:#C9A557;color:#1a3a5c;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0">'+t[0]+'</div><div style="color:#fff;font-size:12px">'+t[1]+'</div></div>';
});
h+='<div style="color:#8A9BB0;font-size:9px;margin-top:12px">TEL: 054-298-7605 | yumemachibisou.com</div></div>';
h+='<div style="padding:24px;border-bottom:8px solid #F4F7FA">';
h+='<div style="background:#1a3a5c;margin:-24px -24px 20px;padding:20px 24px 16px"><div style="color:#fff;font-size:20px;font-weight:800">作業概要</div><div style="color:#C9A557;font-size:11px;font-style:italic;margin-top:2px">Job Summary</div><div style="height:4px;background:#C9A557;margin:12px -24px -16px"></div></div>';
[['物件名',prop],['所在地',addr],['作業日時',ds+'　'+ts],['依頼担当者',cl],['作業担当者',wk]].forEach(function(row,i){
h+='<div style="display:flex;align-items:center;padding:9px 12px;border:1px solid #E8EFF7;border-top:none;font-size:12px;background:'+(i%2===0?'#fff':'#F4F7FA')+'"><div style="color:#1a3a5c;font-weight:700;width:90px;flex-shrink:0">'+row[0]+'</div><div style="width:2px;height:20px;background:#C9A557;margin:0 10px;flex-shrink:0"></div><div style="color:#1a3a5c;flex:1">'+row[1]+'</div></div>';
});
h+='<div style="background:#1a3a5c;color:#8A9BB0;font-size:8px;text-align:center;padding:6px;margin-top:16px">夢街美装　|　TEL 054-298-7605　|　yumemachibisou.com</div></div>';
h+='<div style="padding:24px;border-bottom:8px solid #F4F7FA">';
h+='<div style="background:#1a3a5c;margin:-24px -24px 20px;padding:20px 24px 16px"><div style="color:#fff;font-size:20px;font-weight:800">作業内容チェックリスト</div><div style="color:#C9A557;font-size:11px;font-style:italic;margin-top:2px">Work Checklist</div><div style="height:4px;background:#C9A557;margin:12px -24px -16px"></div></div>';
h+='<div style="display:flex;gap:8px">';
[['水回り清掃',L],['居室・共用部',R]].forEach(function(g){
h+='<div style="flex:1"><div style="background:#1a3a5c;color:#fff;font-size:11px;font-weight:700;padding:6px 10px">'+g[0]+'</div>';
g[1].forEach(function(item){
var isAc=item==='エアコン清掃';
var label=isAc?'エアコン清掃（'+(ac||'0')+'台）':item;
var on=ck[item];
h+='<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:11px;border-bottom:1px solid #E8EFF7;color:'+(on?'#8A9BB0':'#1a3a5c')+'"><div style="width:16px;height:16px;border-radius:4px;border:1.5px solid '+(on?'#C9A557':'#C0CEDC')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;background:'+(on?'#C9A557':'#fff')+';color:#fff">'+(on?'✓':'')+'</div>'+label+'</div>';
});
h+='</div>';
});
